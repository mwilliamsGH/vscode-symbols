<!doctype html>
<html><head><meta charset="utf-8"><style>
  body { background:#1e1e1e; color:#ccc; font:13px -apple-system,sans-serif; margin:0; padding:28px; }
  h2 { color:#fff; font-size:14px; margin:0 0 12px; }
  .row { display:flex; gap:26px; padding:18px 22px; background:#181818; border:1px solid #2a2a2a; border-radius:8px; }
  .cell { text-align:center; }
  .cell img { display:block; margin:0 auto 6px; }
  .lbl { color:#9aa; font-size:11px; }
  .exp { margin-top:18px; background:#1e1e1e; border:1px solid #2a2a2a; border-radius:8px; padding:12px 16px; width:240px; }
  .item { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; color:#cfcfcf; }
  .item img { width:16px; height:16px; }
</style></head><body>
  <h2>Chips set — 64 / 32 / 16px</h2>
  <div class="row">
    <div class="cell"><img src="src/icons/folders/folder-brain.svg" width="64"><img src="src/icons/folders/folder-brain.svg" width="32"><img src="src/icons/folders/folder-brain.svg" width="16"><div class="lbl">brain · pink</div></div>
    <div class="cell"><img src="src/icons/folders/folder-systems.svg" width="64"><img src="src/icons/folders/folder-systems.svg" width="32"><img src="src/icons/folders/folder-systems.svg" width="16"><div class="lbl">grid · indigo</div></div>
    <div class="cell"><img src="src/icons/folders/folder-agents.svg" width="64"><img src="src/icons/folders/folder-agents.svg" width="32"><img src="src/icons/folders/folder-agents.svg" width="16"><div class="lbl">robot · emerald</div></div>
    <div class="cell"><img src="src/icons/folders/folder-lab.svg" width="64"><img src="src/icons/folders/folder-lab.svg" width="32"><img src="src/icons/folders/folder-lab.svg" width="16"><div class="lbl">flask · amber</div></div>
    <div class="cell"><img src="src/icons/folders/folder-notes.svg" width="64"><img src="src/icons/folders/folder-notes.svg" width="32"><img src="src/icons/folders/folder-notes.svg" width="16"><div class="lbl">notebook · sky</div></div>
    <div class="cell"><img src="src/icons/folders/folder-archives.svg" width="64"><img src="src/icons/folders/folder-archives.svg" width="32"><img src="src/icons/folders/folder-archives.svg" width="16"><div class="lbl">box · slate</div></div>
  </div>
  <h2 style="margin-top:24px">In the explorer (16px)</h2>
  <div class="exp">
    <div class="item"><img src="src/icons/folders/folder-brain.svg">00-brain</div>
    <div class="item"><img src="src/icons/folders/folder-systems.svg">01-systems</div>
    <div class="item"><img src="src/icons/folders/folder-agents.svg">02-agents</div>
    <div class="item"><img src="src/icons/folders/folder-lab.svg">03-lab</div>
    <div class="item"><img src="src/icons/folders/folder-notes.svg">04-notes</div>
    <div class="item"><img src="src/icons/folders/folder-archives.svg">05-archives</div>
  </div>
</body></html>
